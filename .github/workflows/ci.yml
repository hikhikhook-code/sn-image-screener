name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: System libs for OpenCV / Qt offscreen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libxkbcommon0 libdbus-1-3 \
            libegl1 libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install opencv-python-headless

      - name: Run tests (no display required)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

  smoke-import:
    name: UI smoke import
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libxkbcommon0 libdbus-1-3 \
            libegl1 libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0
      - run: |
          pip install -r requirements.txt
          pip install opencv-python-headless
      - name: Import & instantiate window (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "
          from sn_image_screener.main import QApplication
          from sn_image_screener.ui.main_window import MainWindow
          app = QApplication([])
          w = MainWindow()
          w.show()
          print('OK')
          "
